{% extends 'base.html' %}

{% block title %}Iniciar sesión - DEA4EVER{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="card shadow-sm" style="width: 100%; max-width: 400px;">
        <div class="card-body p-4">
            <h2 class="text-center mb-4" style="color: #00a699;">Bienvenido</h2>
            <p class="text-center text-muted mb-4">Inicia sesión para continuar</p>
            
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="username" class="form-label">Usuario</label>
                    <input type="text" name="username" id="username" class="form-control" placeholder="Nombre de usuario" required>
                </div>
                
                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" name="password" id="password" class="form-control" placeholder="Contraseña" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2">Iniciar sesión</button>
            </form>
            
            <p class="text-center mt-3 mb-0">
                ¿No tienes cuenta? <a href="/signup/" style="color: #00a699;">Regístrate</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
