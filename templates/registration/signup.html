{% extends 'base.html' %}

{% block title %}Registro - DEA4EVER{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center py-5">
    <div class="card shadow-sm" style="width: 100%; max-width: 450px;">
        <div class="card-body p-4">
            <h2 class="text-center mb-4" style="color: #00a699;">Crear cuenta</h2>
            <p class="text-center text-muted mb-4">Únete a DEA4EVER</p>
            
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="username" class="form-label">Usuario</label>
                    <input type="text" name="username" id="username" class="form-control" required>
                </div>
                
                <div class="mb-3">
                    <label for="email" class="form-label">Correo electrónico</label>
                    <input type="email" name="email" id="email" class="form-control" required>
                </div>
                
                <div class="mb-3">
                    <label for="password1" class="form-label">Contraseña</label>
                    <input type="password" name="password1" id="password1" class="form-control" required>
                </div>
                
                <div class="mb-3">
                    <label for="password2" class="form-label">Confirmar contraseña</label>
                    <input type="password" name="password2" id="password2" class="form-control" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2">Registrarse</button>
            </form>
            
            <p class="text-center mt-3 mb-0">
                ¿Ya tienes cuenta? <a href="/login/" style="color: #00a699;">Inicia sesión</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
